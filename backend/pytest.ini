[pytest]
asyncio_mode = auto
testpaths = tests
addopts =
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=100
    --ignore=tests/integration
    -p no:cacheprovider
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
markers =
    integration: requires real external services (Phoenix/Vertex/Redis); skipped in unit CI
