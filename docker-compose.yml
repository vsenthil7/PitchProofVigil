services:
  backend:
    build: ./backend
    environment:
      USE_MOCKS: "${USE_MOCKS:-true}"
      GOOGLE_CLOUD_PROJECT: "${GOOGLE_CLOUD_PROJECT:-}"
      PHOENIX_COLLECTOR_ENDPOINT: "${PHOENIX_COLLECTOR_ENDPOINT:-http://phoenix:6006}"
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

  # Optional self-hosted Arize Phoenix (free/OSS). Uncomment to enable.
  # phoenix:
  #   image: arizephoenix/phoenix:latest
  #   ports:
  #     - "6006:6006"
